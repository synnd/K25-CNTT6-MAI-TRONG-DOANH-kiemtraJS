
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý danh bạ</title>
    <!-- <link rel="stylesheet" href="./contact.css" /> -->
     <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary-color: #2563eb;
  --primary-hover: #1d4ed8;
  --secondary-color: #64748b;
  --success-color: #10b981;
  --danger-color: #ef4444;
  --danger-hover: #dc2626;
  --warning-color: #f59e0b;
  --warning-hover: #d97706;
  --bg-color: #f8fafc;
  --card-bg: #ffffff;
  --border-color: #e2e8f0;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
    0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
    0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --radius: 8px;
  --radius-lg: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
  color: var(--text-primary);
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

/* Header */
.header {
  background: var(--card-bg);
  padding: 24px 32px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  margin-bottom: 24px;
  text-align: center;
  border: 1px solid var(--border-color);
}

.header h1 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

/* Form Section */
.form-section {
  background: var(--card-bg);
  padding: 32px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-color);
  margin-bottom: 24px;
}

.contact-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  align-items: end;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-primary);
}

.form-group input {
  padding: 12px 16px;
  border: 2px solid var(--border-color);
  border-radius: var(--radius);
  font-size: 1rem;
  transition: all 0.2s ease;
  font-family: inherit;
}

.form-group input:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.form-group input::placeholder {
  color: var(--text-secondary);
}

.btn-add {
  background: var(--primary-color);
  color: white;
  border: none;
  padding: 0 16px;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-md);
  height: 49px;
}

.btn-add:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.btn-add:active {
  transform: translateY(0);
}

/* Table Section */
.table-section {
  background: var(--card-bg);
  padding: 24px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-color);
}

.table-wrapper {
  overflow-x: auto;
}

.contact-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}

.contact-table thead {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.contact-table th {
  padding: 16px;
  text-align: left;
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.02em;
}

.contact-table th:first-child {
  border-top-left-radius: var(--radius);
}

.contact-table th:last-child {
  border-top-right-radius: var(--radius);
}

.contact-table tbody tr {
  border-bottom: 1px solid var(--border-color);
  transition: background-color 0.2s ease;
}

.contact-table tbody tr:hover {
  background-color: #f8fafc;
}

.contact-table tbody tr:last-child {
  border-bottom: none;
}

.contact-table td {
  padding: 16px;
  font-size: 0.95rem;
  color: var(--text-primary);
}

.contact-table td:nth-child(1) {
  font-weight: 600;
  color: var(--text-secondary);
  text-align: center;
  width: 80px;
}

.contact-table td:nth-child(3) {
  font-weight: 600;
  color: var(--primary-color);
}

.contact-table td:nth-child(4) {
  color: var(--success-color);
}

/* Action Buttons */
.action-buttons {
  display: flex;
  gap: 8px;
}

.btn-edit,
.btn-delete {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-edit {
  background: var(--warning-color);
  color: white;
}

.btn-edit:hover {
  background: var(--warning-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-delete {
  background: var(--danger-color);
  color: white;
}

.btn-delete:hover {
  background: var(--danger-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-edit:active,
.btn-delete:active {
  transform: translateY(0);
}

/* Responsive */
@media (max-width: 768px) {
  body {
    padding: 14px;
  }

  .header h1 {
    font-size: 1.5rem;
  }

  .contact-form {
    grid-template-columns: 1fr;
  }

  .form-section {
    padding: 24px;
  }

  .table-section {
    padding: 16px;
  }

  .action-buttons {
    flex-direction: column;
  }

  .btn-edit,
  .btn-delete {
    width: 100%;
  }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-secondary);
}

.empty-state p {
  font-size: 1.1rem;
}
     </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1>Quản lý danh bạ</h1>
      </header>

      <!-- Form thêm danh bạ -->
      <section class="form-section">
        <form id="contact-form" class="contact-form">
          <div class="form-group">
            <label for="contact-name">Họ tên:</label>
            <input
              type="text"
              id="contact-name"
              name="name"
              placeholder="Nhập họ tên"
              required
            />
          </div>

          <div class="form-group">
            <label for="contact-phone">Số điện thoại:</label>
            <input
              type="tel"
              id="contact-phone"
              name="phone"
              placeholder="Nhập số điện thoại"
              required
            />
          </div>

          <div class="form-group">
            <label for="contact-email">Email:</label>
            <input
              type="email"
              id="contact-email"
              name="email"
              placeholder="Nhập email"
              required
            />
          </div>

          <button type="submit" class="btn-add" onclick="addContact(e)">Thêm</button>
        </form>
      </section>

      <!-- Bảng danh sách danh bạ -->
      <section class="table-section">
        <div class="table-wrapper">
          <table class="contact-table">
            <thead>
              <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Số điện thoại</th>
                <th>Email</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="contact-tbody">

                <td>1</td>
                <td>Nguyễn Văn An</td>
                <td>0901234567</td>
                <td>nguyenvanan@email.com</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-edit">Sửa</button>
                    <button class="btn-delete">Xóa</button>
                  </div>
                </td>
              </tr>
              <tr>
                <td>2</td>
                <td>Trần Thị Bình</td>
                <td>0912345678</td>
                <td>tranthibinh@email.com</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-edit">Sửa</button>
                    <button class="btn-delete">Xóa</button>
                  </div>
                </td>
              </tr>
              <tr> -->
                <!-- <td>3</td>
                <td>Lê Văn Cường</td>
                <td>0923456789</td>
                <td>levancuong@email.com</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-edit">Sửa</button>
                    <button class="btn-delete">Xóa</button>
                  </div>
                </td>
              </tr>
              <tr>
                <td>4</td>
                <td>Phạm Thị Dung</td>
                <td>0934567890</td>
                <td>phamthidung@email.com</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-edit">Sửa</button>
                    <button class="btn-delete">Xóa</button>
                  </div>
                </td>
              </tr> -->
              <!-- <tr>
                <td>5</td>
                <td>Hoàng Văn Em</td>
                <td>0945678901</td>
                <td>hoangvanem@email.com</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-edit">Sửa</button>
                    <button class="btn-delete">Xóa</button>
                  </div>
                </td>
              </tr> -->
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <script>
        let contact=[
            {id: 1 ,name:"Nguyễn Văn An", phone:"0901234567" , email:"nguyenvanan@email.com"},
            {id: 2 ,name:"Trần Thị Bình", phone:"0912345678" , email:"tranthibinh@email.com"},
            {id: 3 ,name:"Trần Thị Bình", phone:"0912345677" , email:"tranthibinh2@email.com"},

        ]
        let name=document.getElementById("contact-name");
        let phone=document.getElementById("contact-phone");
        let email=document.getElementById("contact-email");

        function renderContact() {
            let tableBody=document.getElementById("contact-tbody");
            tableBody.innerHTML='';

            contact.forEach(ele=>{
                let row=document.createElement("tr");
                row.innerHTML=`
                    <td>${ele.id}</td>
                    <td>${ele.name}</td>
                    <td>${ele.phone}</td>
                    <td>${ele.email}</td>
                    <td>
                    <div class="action-buttons">
                        <button class="btn-edit" onclick="updateContact(${ele.id})">Sửa</button>
                        <button class="btn-delete" onclick="delContact(${ele.id})">Xóa</button>
                    </div>
                    </td>
                `
                tableBody.appendChild(row);
            })
        }
        renderContact();
        function delContact(id) {
            let findId=contact.findIndex(ele=>ele.id===id);
            if (findId===-1) {
                return;
            };

            let check=confirm("Bạn có chắc chắn muốn xóa sản phẩm này?");
            if (check) {
                contact.splice(findId,1);
                alert("Xóa sản phẩm thành công!");
                localStorage.setItem("contact",JSON.stringify(contact));
                renderContact();

            } else{
                alert("Hủy thao tác xóa");
            }
        }

        // sửa
        function updateContact(id) {
            let findContact=contact.find(ele=>ele.id===id);
            name.value=findContact.name;
            phone.value=findContact.phone;
            email.value=findContact.email;
            document.getElementsByClassName("btn-add").innerHTML="Chỉnh sửa "
        }
        function addContact() {
            e.preventDefault();
            let findId=contact.findIndex(ele=>ele.id===id);

            contact[findId].name=name.value;
            contact[findId].phone=phone.value;
            contact[findId].email=email.value;

        }
    </script>
  </body>
